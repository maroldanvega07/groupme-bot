version: '3.8'

services:
  groupme-bot:
    build: .
    container_name: groupme-bot
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - GROUPME_BOT_ID=${GROUPME_BOT_ID}
      - OPENWEBUI_URL=${OPENWEBUI_URL}
      - OPENWEBUI_API_KEY=${OPENWEBUI_API_KEY}
      - OPENWEBUI_MODEL=${OPENWEBUI_MODEL}
      - PORT=3001
    volumes:
      - ./logs:/app/logs
    networks:
      - groupme-network

networks:
  groupme-network:
    driver: bridge
